<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Define neon glow filter -->
  <defs>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="120" fill="#001a33" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="50" cy="20" r="15" fill="url(#neonBlue)" filter="url(#neonGlow)"/>
  
  <!-- Eyes -->
  <circle cx="44" cy="18" r="2.5" fill="#000"/>
  <circle cx="56" cy="18" r="2.5" fill="#000"/>
  
  <!-- Visor line -->
  <line x1="38" y1="20" x2="62" y2="20" stroke="#00ffff" stroke-width="1.5" filter="url(#neonGlow)"/>
  
  <!-- Body/Torso -->
  <rect x="35" y="36" width="30" height="40" rx="3" fill="url(#neonBlue)" filter="url(#neonGlow)"/>
  
  <!-- Chest line -->
  <line x1="50" y1="36" x2="50" y2="76" stroke="#00ffff" stroke-width="1" filter="url(#neonGlow)"/>
  
  <!-- Left arm -->
  <rect x="20" y="42" width="12" height="35" rx="2" fill="#00ccff" filter="url(#neonGlow)"/>
  
  <!-- Right arm -->
  <rect x="68" y="42" width="12" height="35" rx="2" fill="#00ccff" filter="url(#neonGlow)"/>
  
  <!-- Left leg -->
  <rect x="35" y="76" width="10" height="38" rx="2" fill="#00ffff" filter="url(#neonGlow)"/>
  
  <!-- Right leg -->
  <rect x="55" y="76" width="10" height="38" rx="2" fill="#00ffff" filter="url(#neonGlow)"/>
  
  <!-- Speed lines (running effect) -->
  <line x1="18" y1="50" x2="8" y2="50" stroke="#ff00ff" stroke-width="1.5" opacity="0.7" filter="url(#neonGlow)"/>
  <line x1="20" y1="60" x2="5" y2="60" stroke="#ff00ff" stroke-width="1.5" opacity="0.6" filter="url(#neonGlow)"/>
  
  <!-- Dash indicator -->
  <circle cx="50" cy="60" r="25" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5" filter="url(#neonGlow)"/>
</svg>