<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Define neon glow filter -->
  <defs>
    <filter id="neonPurple">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="samuraiPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="120" fill="#330033" opacity="0.3"/>
  
  <!-- Head with helmet -->
  <circle cx="50" cy="20" r="16" fill="url(#samuraiPurple)" filter="url(#neonPurple)"/>
  
  <!-- Helmet crest -->
  <polygon points="50,4 42,12 58,12" fill="#ff00ff" filter="url(#neonPurple)"/>
  
  <!-- Eyes -->
  <circle cx="43" cy="18" r="2.5" fill="#000"/>
  <circle cx="57" cy="18" r="2.5" fill="#000"/>
  
  <!-- Visor -->
  <rect x="40" y="22" width="20" height="3" rx="1.5" fill="#ff00ff" filter="url(#neonPurple)"/>
  
  <!-- Body/Armor -->
  <rect x="32" y="36" width="36" height="42" rx="2" fill="url(#samuraiPurple)" filter="url(#neonPurple)"/>
  
  <!-- Chest plate lines -->
  <line x1="45" y1="36" x2="45" y2="78" stroke="#ff00ff" stroke-width="1.5" filter="url(#neonPurple)"/>
  <line x1="55" y1="36" x2="55" y2="78" stroke="#ff00ff" stroke-width="1.5" filter="url(#neonPurple)"/>
  
  <!-- Shoulder armor left -->
  <rect x="20" y="40" width="12" height="28" rx="2" fill="#dd00dd" filter="url(#neonPurple)"/>
  
  <!-- Shoulder armor right -->
  <rect x="68" y="40" width="12" height="28" rx="2" fill="#dd00dd" filter="url(#neonPurple)"/>
  
  <!-- Sword arm (left) -->
  <rect x="15" y="45" width="8" height="40" rx="2" fill="#ff00ff" filter="url(#neonPurple)"/>
  
  <!-- Right arm -->
  <rect x="77" y="45" width="8" height="40" rx="2" fill="#ff00ff" filter="url(#neonPurple)"/>
  
  <!-- Left leg (stance) -->
  <rect x="32" y="78" width="12" height="36" rx="2" fill="#ff00ff" filter="url(#neonPurple)"/>
  
  <!-- Right leg (stance) -->
  <rect x="56" y="78" width="12" height="36" rx="2" fill="#ff00ff" filter="url(#neonPurple)"/>
  
  <!-- Smash aura -->
  <circle cx="50" cy="60" r="28" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.4" filter="url(#neonPurple)"/>
  <circle cx="50" cy="60" r="22" fill="none" stroke="#ff00ff" stroke-width="0.8" opacity="0.2" filter="url(#neonPurple)"/>
  
  <!-- Power indicator -->
  <polygon points="12,42 8,50 12,58" fill="#ff00ff" opacity="0.6" filter="url(#neonPurple)"/>
</svg>