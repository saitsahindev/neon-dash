<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Canvas Game</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: #000;
      }

      .menu {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: grid;
        place-content: center;
        gap: 16px;
        padding: 24px;
        color: #fff;
        text-align: center;
        background: rgba(0, 0, 0, 0.78);
        font-family: Arial, sans-serif;
      }

      .hidden {
        display: none;
      }

      .menu button {
        padding: 12px 20px;
        border: 1px solid #00ffff;
        color: #fff;
        background: #050505;
        cursor: pointer;
      }

      .skin-list {
        display: flex;
        justify-content: center;
        gap: 12px;
      }

      .character-selection {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 20px 0;
        max-width: 600px;
      }

      .character-card {
        padding: 20px;
        border: 2px solid #00ffff;
        background: rgba(0, 20, 40, 0.8);
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      }

      .character-card:hover {
        border-color: #ff0055;
        box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
        transform: scale(1.05);
      }

      .character-card.selected {
        border-color: #00ff00;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.8);
        background: rgba(0, 40, 20, 0.9);
      }

      .character-image {
        width: 100px;
        height: 100px;
        margin: 0 auto 12px;
        background: rgba(0, 50, 100, 0.6);
        border: 2px solid #00ffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.3);
      }

      .character-card.selected .character-image {
        border-color: #00ff00;
        box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.5);
      }

      .character-image img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }

      .character-name {
        font-size: 16px;
        font-weight: bold;
        color: #00ffff;
        margin: 8px 0;
        text-transform: uppercase;
        letter-spacing: 2px;
      }

      .character-card.selected .character-name {
        color: #00ff00;
      }

      .character-ability {
        font-size: 12px;
        color: #ffff00;
        margin: 8px 0;
        font-style: italic;
      }

      .character-stats {
        font-size: 11px;
        color: #00ffff;
        margin-top: 10px;
        text-align: left;
        line-height: 1.6;
      }

      .stat-bar {
        display: flex;
        align-items: center;
        margin: 4px 0;
        gap: 8px;
      }

      .stat-label {
        min-width: 50px;
        font-size: 10px;
      }

      .stat-fill {
        flex: 1;
        height: 6px;
        background: rgba(0, 255, 255, 0.2);
        border: 1px solid #00ffff;
        position: relative;
      }

      .stat-progress {
        height: 100%;
        background: linear-gradient(90deg, #00ffff, #00ff88);
        box-shadow: 0 0 8px #00ffff;
      }

      .skin-card {
        width: 52px;
        height: 52px;
        border: 3px solid transparent;
        cursor: pointer;
      }

      .skin-card.active {
        border-color: #fff;
        box-shadow: 0 0 14px currentColor;
      }

      #characterInfo {
        position: fixed;
        top: 24px;
        left: 24px;
        font-size: 14px;
        color: #00ffff;
        text-shadow: 0 0 10px #00ffff;
        z-index: 2;
        pointer-events: none;
      }

      #abilityStatus {
        position: fixed;
        bottom: 24px;
        left: 24px;
        font-size: 13px;
        color: #ffff00;
        text-shadow: 0 0 10px #ffff00;
        z-index: 2;
        pointer-events: none;
        font-family: monospace;
      }

      .ability-cooldown {
        display: inline-block;
        padding: 4px 8px;
        background: rgba(255, 255, 0, 0.1);
        border: 1px solid #ffff00;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas" aria-label="Oyun alanı"></canvas>
    <div id="characterInfo"></div>
    <div id="abilityStatus"></div>
    <section id="mainMenu" class="menu" aria-label="Ana menü">
      <h1>NEON DASH</h1>
      <button id="startBtn" type="button">OYNA</button>
      <button id="speedModeBtn" type="button">SPEED MODE</button>
      <button id="hardModeBtn" type="button">HARD MODE</button>
      <button id="charSelectBtn" type="button">KARAKTER SEÇ</button>
    </section>
    <section id="charMenu" class="menu hidden" aria-label="Karakter seçimi">
      <h2>KARAKTERİNİ SEÇ</h2>
      <div class="character-selection">
        <div class="character-card" data-character="runner">
          <div class="character-image">
            <img src="assets/graphics/characters/runner.svg" alt="Neon Runner">
          </div>
          <div class="character-name">Neon Runner</div>
          <div class="character-ability">⚡ Yetenek: DASH</div>
          <div class="character-stats">
            <div class="stat-bar">
              <span class="stat-label">Hız</span>
              <div class="stat-fill"><div class="stat-progress" style="width: 85%"></div></div>
            </div>
            <div class="stat-bar">
              <span class="stat-label">Zıplama</span>
              <div class="stat-fill"><div class="stat-progress" style="width: 65%"></div></div>
            </div>
            <div class="stat-bar">
              <span class="stat-label">Özel</span>
              <div class="stat-fill"><div class="stat-progress" style="width: 90%"></div></div>
            </div>
          </div>
        </div>
        <div class="character-card" data-character="techno_samurai">
          <div class="character-image">
            <img src="assets/graphics/characters/techno_samurai.svg" alt="Techno-Samurai">
          </div>
          <div class="character-name">Techno-Samurai</div>
          <div class="character-ability">⚔️ Yetenek: SMASH ATTACK</div>
          <div class="character-stats">
            <div class="stat-bar">
              <span class="stat-label">Hız</span>
              <div class="stat-fill"><div class="stat-progress" style="width: 60%"></div></div>
            </div>
            <div class="stat-bar">
              <span class="stat-label">Zıplama</span>
              <div class="stat-fill"><div class="stat-progress" style="width: 85%"></div></div>
            </div>
            <div class="stat-bar">
              <span class="stat-label">Özel</span>
              <div class="stat-fill"><div class="stat-progress" style="width: 80%"></div></div>
            </div>
          </div>
        </div>
      </div>
      <button id="backMenuBtn" type="button">GERİ</button>
    </section>
    <section id="pauseMenu" class="menu hidden" aria-label="Duraklatma menüsü">
      <h2>OYUN DURAKLATILDI</h2>
      <button id="resumeBtn" type="button">DEVAM ET</button>
    </section>
    <script src="game.js"></script>
  </body>
</html>
